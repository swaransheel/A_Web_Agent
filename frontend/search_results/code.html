<script>
// API Configuration
const API_BASE_URL = 'http://localhost:8000/api';
const DEMO_MODE = true; // Enable demo responses if backend fails

// Initialize Results Page
function initResultsPage() {
    const followUpInput = document.getElementById('followUpInput');
    const followUpBtn = document.getElementById('followUpBtn');
    const copyBtn = document.getElementById('copyBtn');
    
    // Load and display results
    displayResults();
    
    // Follow-up search handler
    if (followUpBtn) {
        followUpBtn.addEventListener('click', () => {
            const query = followUpInput?.value || '';
            if (query.trim()) performFollowUp(query);
        });
    }
    
    if (followUpInput) {
        followUpInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = followUpInput.value;
                if (query.trim()) performFollowUp(query);
            }
        });
    }
    
    // Copy to clipboard handler
    if (copyBtn) {
        copyBtn.addEventListener('click', copyToClipboard);
    }
    
    // New Research button - navigate back to home
    const newResearchBtns = document.querySelectorAll('[data-action="new-research"]');
    newResearchBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            window.location.href = '../search_home/code.html';
        });
    });
}

// Copy answer to clipboard
function copyToClipboard() {
    const copyBtn = document.getElementById('copyBtn');
    const answer = document.getElementById('answerContent')?.innerText || '';
    if (answer) {
        navigator.clipboard.writeText(answer).then(() => {
            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = '<span class="material-symbols-outlined text-base">check</span>Copied!';
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
            }, 2000);
        }).catch(err => {
            console.error('Copy failed:', err);
        });
    }
}

// Display search results from backend
function displayResults() {
    const response = JSON.parse(sessionStorage.getItem('lastResponse') || '{}');
    const query = sessionStorage.getItem('lastQuery') || 'Your Search';
    
    // Update title
    const answerTitle = document.getElementById('answerTitle');
    if (answerTitle) answerTitle.textContent = 'Research Results for: ' + query;
    
    // Update answer content
    const answerContent = document.getElementById('answerContent');
    if (answerContent) {
        if (response.answer) {
            // Parse answer into paragraphs
            const paragraphs = response.answer.split(/\n\n+/).filter(p => p.trim());
            answerContent.innerHTML = paragraphs
                .map(p => `<p>${escapeHtml(p.trim())}</p>`)
                .join('');
        } else {
            answerContent.innerHTML = '<p>No response received. Please try again.</p>';
        }
    }
    
    // Update sources
    displaySources(response.sources || []);
    
    // Update follow-up input value
    const followUpInput = document.getElementById('followUpInput');
    if (followUpInput) followUpInput.placeholder = `Follow up on: ${query}`;
}

// Display sources in the sidebar
function displaySources(sources) {
    const sourcesList = document.getElementById('sourcesList');
    const sourceCount = document.getElementById('sourceCount');
    
    if (!sourcesList) return;
    
    if (!sources || sources.length === 0) {
        sourcesList.innerHTML = '<p class="text-sm text-on-surface-variant">No sources available</p>';
        if (sourceCount) sourceCount.textContent = '0 Sources';
        return;
    }
    
    // Update source count
    if (sourceCount) {
        sourceCount.textContent = sources.length + (sources.length === 1 ? ' Source' : ' Sources');
    }
    
    sourcesList.innerHTML = sources.map((url, idx) => {
        let displayUrl = url;
        let hostname = 'Source';
        try {
            hostname = new URL(url).hostname.replace('www.', '');
        } catch (e) {
            // Invalid URL, use as-is
        }
        
        return `
        <a class="block p-4 bg-surface-container-high hover:bg-surface-bright rounded-md border border-transparent hover:border-outline-variant/30 transition-all group" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(url)}">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-6 h-6 rounded bg-white/10 flex items-center justify-center overflow-hidden">
                    <span class="material-symbols-outlined text-sm">link</span>
                </div>
                <span class="text-[10px] font-bold text-on-surface-variant group-hover:text-secondary transition-colors">Source ${idx + 1}</span>
            </div>
            <p class="text-sm font-semibold line-clamp-2">${escapeHtml(hostname)}</p>
            <p class="text-xs text-on-surface-variant line-clamp-1 mt-1">${escapeHtml(displayUrl)}</p>
        </a>
        `;
    }).join('');
}

// Perform follow-up search
async function performFollowUp(query) {
    if (!query.trim()) return;
    
    try {
        const followUpBtn = document.getElementById('followUpBtn');
        const originalText = followUpBtn.innerHTML;
        followUpBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">hourglass_top</span>Researching...';
        followUpBtn.disabled = true;
        
        let data;
        try {
            const response = await fetch(`${API_BASE_URL}/search`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            
            data = await response.json();
            
            if (!response.ok) {
                throw new Error(data.detail || 'Search failed');
            }
        } catch (apiError) {
            // Use demo response if backend unavailable
            if (DEMO_MODE) {
                console.warn('Backend unavailable, using demo response for follow-up');
                data = {
                    answer: `Here's additional information about "${query}":\n\nThis is a demonstration response. The follow-up system is working correctly and would provide a detailed, contextual answer when the API is available.\n\nYou can:\n- Click sources to explore further\n- Ask new follow-up questions\n- Copy the answer to clipboard\n- Start a new research session`,
                    sources: [
                        "https://www.wikipedia.org/",
                        "https://www.github.com/",
                    ]
                };
            } else {
                throw apiError;
            }
        }
        
        // Update sessionStorage and display new results
        sessionStorage.setItem('lastResponse', JSON.stringify(data));
        sessionStorage.setItem('lastQuery', query);
        displayResults();
        
        // Clear input and scroll to top
        const followUpInput = document.getElementById('followUpInput');
        if (followUpInput) followUpInput.value = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (error) {
        alert('Follow-up search failed: ' + error.message);
    } finally {
        const followUpBtn = document.getElementById('followUpBtn');
        followUpBtn.innerHTML = originalText;
        followUpBtn.disabled = false;
    }
}

// HTML escape utility
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', initResultsPage);
</script>
